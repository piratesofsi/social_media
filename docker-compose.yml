version: "3.8"

services:
  mongo:
    image: mongo:6
    container_name: postit-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: postit-server
    depends_on:
      - mongo
    environment:
      MONGO_URI: "mongodb://mongo:27017/postit"
      TOKEN_KEY: "change-me"
      PORT: "4000"
    ports:
      - "4000:4000"
    volumes:
      - .:/app
      - /app/node_modules
    command: ["npm", "run", "server"]

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: postit-client
    depends_on:
      - server
    ports:
      - "3000:3000"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./client:/app
      - /app/node_modules

volumes:
  mongo_data:
